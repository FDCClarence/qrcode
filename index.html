<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>System Console</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: monospace;
      overflow: hidden;
    }

    #terminal {
      padding: 20px;
      white-space: pre-wrap;
      font-size: 25px;
      line-height: 1.3em;
    }

    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      background: white;
      animation: blink 0.7s infinite;
    }

    #jumpscare {
      position: fixed;
      top: 50%;
      left: 50%;
      width: min(70vmin, 420px);
      transform: translate(-50%, -50%) scale(0.05);
      transform-origin: center center;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      will-change: transform, opacity, filter;
      filter: blur(2px);
    }

    #jumpscare.active {
      animation: truckRush 850ms cubic-bezier(0.08, 0.72, 0.22, 1) forwards;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes truckRush {
      0% {
        transform: translate(-50%, -50%) scale(0.05);
        opacity: 0;
        filter: blur(5px);
      }
      12% {
        opacity: 1;
        filter: blur(0);
      }
      45% {
        transform: translate(-50%, -50%) scale(1.8);
        opacity: 1;
        filter: blur(0);
      }
      75% {
        transform: translate(-50%, -50%) scale(6.5);
        opacity: 0.95;
        filter: blur(1px);
      }
      100% {
        transform: translate(-50%, -50%) scale(12);
        opacity: 0;
        filter: blur(8px);
      }
    }
  </style>
</head>
<body>

<div id="terminal"></div>
<span class="cursor"></span>
<div class="scanline"></div>
<img id="jumpscare" src="Beans3 - color %23DFF6FF.PNG" alt="jumpscare cat" />

<script>
const baseLines = [
"boot sequence initiated...",
"mounting /system partition...",
"checking device integrity...",
"loading kernel modules...",
"authenticating user session...",
"bypassing tubz restrictions...",
"calculating beanz foopah circumference...",
"syncing data streams...",
"analyzing device fingerprint...",
"injecting runtime process...",
"compiling background tasks...",
"establishing secure tunnel...",
"monitoring active connections...",
"optimizing system resources...",
"scanning local network...",
"verifying credentials...",
"access granted...",
"running diagnostics...", 
"initiating rona overdrive..."
];

let terminal = document.getElementById("terminal");
const jumpscare = document.getElementById("jumpscare");

function randomLine() {
  const line = baseLines[Math.floor(Math.random() * baseLines.length)];
  const noise = Math.floor(Math.random() * 9999);
  const timestamp = new Date().toISOString().split("T")[1].split(".")[0];
  return `[${timestamp}] ${line} :: ${noise}`;
}

function addLine() {
  terminal.innerHTML += randomLine() + "\n";

  // auto scroll illusion
  window.scrollTo(0, document.body.scrollHeight);

  // keep it fast
  setTimeout(addLine, 120);
}

// start instantly
addLine();

// Wait until everything is fully loaded, then delay 3s.
window.addEventListener("load", () => {
  setTimeout(() => {
    jumpscare.classList.add("active");
  }, 3000);
});
</script>

</body>
</html>
